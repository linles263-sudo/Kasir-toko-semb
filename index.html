let keranjang = [];
let html5QrcodeScanner;

function renderProduk(filter = 'Semua') {
  const list = document.getElementById('produkList');
  const data = filter === 'Semua' ? produk : produk.filter(p => p.kategori === filter);
  list.innerHTML = data.map(p => `
    <div class="produk-card">
      <div class="produk-info">
        <h3>${p.nama}</h3>
        <p>${p.barcode}</p>
      </div>
      <div class="produk-right">
        <div class="produk-harga">${p.harga.toLocaleString('id-ID')}</div>
        <button class="btn-tambah" onclick="tambahKeranjang(${p.id})">TAMBAH</button>
      </div>
    </div>
  `).join('');
}

function filterKategori(kat) {
  document.querySelectorAll('.kategori button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderProduk(kat);
}

function tambahKeranjang(id) {
  const item = keranjang.find(i => i.id === id);
  if(item) item.qty++;
  else keranjang.push({...produk.find(p=>p.id===id),qty:1});
  updateKeranjang();
  navigator.vibrate(50);
}

function updateKeranjang() {
  const total = keranjang.reduce((sum,i) => sum + i.harga*i.qty, 0);
  const count = keranjang.reduce((sum,i) => sum + i.qty, 0);
  document.getElementById('totalHarga').textContent = 'Rp'+total.toLocaleString('id-ID');
  document.getElementById('cartCount').textContent = count;
}

function bayarWA() {
  if(keranjang.length===0) return alert('Keranjang kosong!');
  let pesan = `*PESANAN TOKO ANIS*%0A%0A`;
  keranjang.forEach(i => { pesan += `${i.nama} x${i.qty} = Rp${(i.harga*i.qty).toLocaleString('id-ID')}%0A` });
  const total = keranjang.reduce((sum,i) => sum + i.harga*i.qty, 0);
  pesan += `%0A*Total: Rp${total.toLocaleString('id-ID')}*%0A%0ATerima kasih 🙏`;
  window.open(`https://wa.me/6281234567890?text=${pesan}`,'_blank');
}

document.getElementById('btnKamera').onclick = () => {
  const reader = document.getElementById('reader');
  if(reader.style.display === 'none' || reader.style.display === '') {
    reader.style.display = 'block';
    html5QrcodeScanner = new Html5QrcodeScanner("reader",{fps:10,qrbox:250});
    html5QrcodeScanner.render((barcode) => {
      const p = produk.find(p=>p.barcode===barcode);
      if(p) {tambahKeranjang(p.id);} 
      else alert('Produk tidak ditemukan: '+barcode);
    });
  } else {
    html5QrcodeScanner.clear();
    reader.style.display = 'none';
  }
};

document.getElementById('inputManual').onkeyup = (e) => {
  if(e.key==='Enter') {
    const p = produk.find(p=>p.barcode===e.target.value);
    if(p) {tambahKeranjang(p.id); e.target.value='';} 
    else alert('Barcode tidak ditemukan');
  }
};

renderProduk();
